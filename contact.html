<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرسل لنا معلوماتك</title>
    <link rel="stylesheet" href="contact.css">

    <!-- استدعاء خط كايرو -->
</head>

<body>

    <div class="contact-page-container">

        <!-- القسم العلوي (العنوان) -->
        <header class="contact-header">
            <h1>تواصل معنا واحصل على المزيد</h1>
            <p>نحن هنا لمساعدتك</p>
        </header>

        <div class="main-content">
            <!-- كرت نموذج التواصل الأبيض -->
            <div class="contact-card">

                <div class="card-grid">
                    <div class="form-side">
                        <form  action="https://formsubmit.co/mhmad090609@gmail.com" method="POST">
                            <div class="input-group">
                                <label>الاسم الكامل</label>
                                <input type="text" placeholder="Full Name">
                            </div>

                            <div class="input-group">
                                <label>رقم الهاتف / الواتساب</label>
                                <input type="tel" placeholder="WhatsApp Number">
                            </div>

                            <div class="input-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" placeholder="Email Address">
                            </div>

                            <div class="input-group">
                                <label>الرسالة</label>
                                <textarea rows="4" placeholder="Message....."></textarea>
                            </div>

                            <button type="submit" class="submit-btn">إرسال المعلومات</button>
                        </form>
                    </div>

                    <!-- الجانب الأيسر: رسالة التواصل -->
                    <div class="text-side">
                        <h2>أرسل لنا استفسارك أو طلبك وسنقوم بالرد عليك بسرعة!</h2>
                        <p class="en-sub">Send us your inquiry or order we'll reply quickly</p>

                        <div class="direct-contact">
                            <p>📞 +218-916108103</p>
                            <p>📧 mhmad090609@gmail.com</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- تذييل الصفحة البسيط (Footer) -->
        <footer class="footer-info">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>أرسل المعلومات</h4>
                    <p>Phone: +218-916108103</p>
                    <p>WhatsApp: WhatsApp</p>
                </div>
            </div>
        </footer>
    </div>

</body>

</html>
